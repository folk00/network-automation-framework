name: python-ci

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'main.py'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python main.py --inventory examples/inventory.yml --mode render

name: ansible-ci

on:
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-ci.yml'
  pull_request:
    paths:
      - 'ansible/**'

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible + lint
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.15" ansible-lint yamllint

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: yamllint
        run: yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}" .

      - name: ansible-lint
        run: ansible-lint

      - name: Playbook syntax check
        run: |
          for pb in playbooks/*.yml; do
            ansible-playbook --syntax-check "$pb" -i inventories/lab.yml
          done

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4a66"/>
    </marker>
    <linearGradient id="g-input" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9f1fb"/><stop offset="100%" stop-color="#cfe0f5"/>
    </linearGradient>
    <linearGradient id="g-engine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7e0"/><stop offset="100%" stop-color="#ffe6a8"/>
    </linearGradient>
    <linearGradient id="g-out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f5e9"/><stop offset="100%" stop-color="#bfe5c8"/>
    </linearGradient>
    <linearGradient id="g-net" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1e6f6"/><stop offset="100%" stop-color="#d8bce6"/>
    </linearGradient>
    <style>
      .title { font-size: 20px; font-weight: 700; fill: #1c2a44; }
      .group-label { font-size: 12px; font-weight: 700; fill: #3a4a66; letter-spacing: 1px; }
      .box-title { font-weight: 700; fill: #1c2a44; }
      .box-sub { font-size: 11px; fill: #45556e; }
      .edge { stroke: #3a4a66; stroke-width: 1.6; fill: none; }
      .group { fill: #ffffff; stroke: #cdd6e0; stroke-dasharray: 4 4; }
      .node { stroke: #3a4a66; stroke-width: 1.2; }
    </style>
  </defs>

  <text x="40" y="36" class="title">Network Automation Framework — Architecture</text>
  <text x="40" y="58" fill="#45556e">Inventory ▸ Generate ▸ Deploy (dry-run / deploy) ▸ Validate ▸ Report</text>

  <!-- Inputs group -->
  <rect x="40" y="90" width="220" height="200" rx="10" class="group"/>
  <text x="56" y="112" class="group-label">INPUTS</text>
  <g>
    <rect x="60" y="130" width="180" height="60" rx="8" fill="url(#g-input)" class="node"/>
    <text x="76" y="155" class="box-title">Inventory</text>
    <text x="76" y="173" class="box-sub">YAML / CSV / Excel</text>
    <text x="76" y="186" class="box-sub">hosts, OSPF, interfaces</text>
  </g>
  <g>
    <rect x="60" y="210" width="180" height="60" rx="8" fill="url(#g-input)" class="node"/>
    <text x="76" y="235" class="box-title">Jinja2 templates</text>
    <text x="76" y="253" class="box-sub">ios_ospf.j2 (per platform)</text>
  </g>

  <!-- Engine group -->
  <rect x="320" y="90" width="540" height="460" rx="10" class="group"/>
  <text x="336" y="112" class="group-label">PYTHON AUTOMATION ENGINE</text>

  <g>
    <rect x="340" y="130" width="220" height="60" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="356" y="155" class="box-title">inventory_loader.py</text>
    <text x="356" y="173" class="box-sub">YAML → list[Host], schema check</text>
  </g>
  <g>
    <rect x="600" y="130" width="240" height="60" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="616" y="155" class="box-title">config_generator.py</text>
    <text x="616" y="173" class="box-sub">Jinja2 render → list[str] CLI</text>
  </g>

  <g>
    <rect x="340" y="210" width="220" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="356" y="234" class="box-title">connection.py</text>
    <text x="356" y="252" class="box-sub">ConnectionPool (Netmiko)</text>
    <text x="356" y="268" class="box-sub">per-IP lock, show clock liveness</text>
    <text x="356" y="284" class="box-sub">enable + terminal length 0</text>
  </g>
  <g>
    <rect x="600" y="210" width="240" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="616" y="234" class="box-title">ThreadPoolExecutor</text>
    <text x="616" y="252" class="box-sub">concurrent worker pool (8/12/16)</text>
    <text x="616" y="268" class="box-sub">parallel device collection</text>
    <text x="616" y="284" class="box-sub">+ parallel deployment</text>
  </g>

  <g>
    <rect x="340" y="310" width="220" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="356" y="334" class="box-title">parsers/</text>
    <text x="356" y="352" class="box-sub">interfaces · ospf · cdp · vrf</text>
    <text x="356" y="368" class="box-sub">regex-based, pure functions</text>
    <text x="356" y="384" class="box-sub">unit-testable on captured output</text>
  </g>
  <g>
    <rect x="600" y="310" width="240" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="616" y="334" class="box-title">deployer.py</text>
    <text x="616" y="352" class="box-sub">--mode render | dry-run | deploy</text>
    <text x="616" y="368" class="box-sub">unified diff vs. running config</text>
    <text x="616" y="384" class="box-sub">configure terminal revert timer</text>
  </g>

  <g>
    <rect x="340" y="410" width="220" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="356" y="434" class="box-title">validator.py</text>
    <text x="356" y="452" class="box-sub">interface state up/up assertion</text>
    <text x="356" y="468" class="box-sub">OSPF neighbor FULL assertion</text>
    <text x="356" y="484" class="box-sub">fails the change on regression</text>
  </g>
  <g>
    <rect x="600" y="410" width="240" height="80" rx="8" fill="url(#g-engine)" class="node"/>
    <text x="616" y="434" class="box-title">reporters/</text>
    <text x="616" y="452" class="box-sub">excel.py — summary + diff sheets</text>
    <text x="616" y="468" class="box-sub">markdown.py — change record</text>
    <text x="616" y="484" class="box-sub">topology emitter (optional)</text>
  </g>

  <!-- Network group -->
  <rect x="900" y="90" width="240" height="200" rx="10" class="group"/>
  <text x="916" y="112" class="group-label">NETWORK</text>
  <g>
    <rect x="920" y="130" width="200" height="140" rx="8" fill="url(#g-net)" class="node"/>
    <text x="936" y="155" class="box-title">Cisco IOS / IOS-XE</text>
    <text x="936" y="175" class="box-sub">show run | section …</text>
    <text x="936" y="191" class="box-sub">show ip interface brief</text>
    <text x="936" y="207" class="box-sub">show ip ospf neighbor</text>
    <text x="936" y="223" class="box-sub">show ip ospf interface brief</text>
    <text x="936" y="239" class="box-sub">show ip route ospf</text>
    <text x="936" y="255" class="box-sub">show cdp neighbor detail</text>
  </g>

  <!-- Outputs group -->
  <rect x="900" y="320" width="240" height="230" rx="10" class="group"/>
  <text x="916" y="342" class="group-label">OUTPUTS</text>
  <g>
    <rect x="920" y="360" width="200" height="50" rx="8" fill="url(#g-out)" class="node"/>
    <text x="936" y="382" class="box-title">Excel report</text>
    <text x="936" y="398" class="box-sub">summary + per-host diff</text>
  </g>
  <g>
    <rect x="920" y="420" width="200" height="50" rx="8" fill="url(#g-out)" class="node"/>
    <text x="936" y="442" class="box-title">Markdown record</text>
    <text x="936" y="458" class="box-sub">change + validation</text>
  </g>
  <g>
    <rect x="920" y="480" width="200" height="50" rx="8" fill="url(#g-out)" class="node"/>
    <text x="936" y="502" class="box-title">Rendered configs</text>
    <text x="936" y="518" class="box-sub">per-host .cfg files</text>
  </g>

  <!-- Edges -->
  <path class="edge" marker-end="url(#arrow)" d="M240,160 C290,160 290,160 340,160"/>
  <path class="edge" marker-end="url(#arrow)" d="M240,240 C290,240 540,170 600,160"/>

  <path class="edge" marker-end="url(#arrow)" d="M450,190 L450,210"/>
  <path class="edge" marker-end="url(#arrow)" d="M720,190 L720,210"/>

  <path class="edge" marker-end="url(#arrow)" d="M560,250 L600,250"/>

  <path class="edge" marker-end="url(#arrow)" d="M450,290 L450,310"/>
  <path class="edge" marker-end="url(#arrow)" d="M720,290 L720,310"/>

  <path class="edge" marker-end="url(#arrow)" d="M560,350 L600,350"/>

  <path class="edge" marker-end="url(#arrow)" d="M450,390 L450,410"/>
  <path class="edge" marker-end="url(#arrow)" d="M720,390 L720,410"/>

  <!-- Engine <-> Network -->
  <path class="edge" marker-end="url(#arrow)" d="M840,250 C880,250 880,200 920,200"/>
  <path class="edge" marker-end="url(#arrow)" d="M920,220 C880,220 880,260 840,260"/>

  <!-- Engine -> Outputs -->
  <path class="edge" marker-end="url(#arrow)" d="M840,450 L920,400"/>
  <path class="edge" marker-end="url(#arrow)" d="M840,460 L920,445"/>
  <path class="edge" marker-end="url(#arrow)" d="M840,170 C870,170 870,500 920,500"/>

  <!-- Footer -->
  <text x="40" y="610" fill="#7a8699" font-size="11">network-automation-framework · MIT · public lab/demo edition</text>
</svg>

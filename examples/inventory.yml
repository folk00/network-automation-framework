# Sample lab inventory — three Cisco IOS-XE routers in OSPF area 0.
# All addressing is RFC1918. Replace with your own values for a real run.
# MD5 keys here are placeholders; never commit real keys.

routers:
  - hostname: lab-edge-r1
    management_ip: 10.20.0.11
    loopback:
      id: 0
      ip: 10.255.0.11
      mask: 255.255.255.255
    ospf_process_id: 10
    ospf_router_id: 10.255.0.11
    interfaces:
      - name: GigabitEthernet0/0/1
        description: to lab-core-sw1
        ip: 10.20.1.1
        mask: 255.255.255.252
        ospf_area: 0
        ospf_authentication: md5
        ospf_key_id: 1

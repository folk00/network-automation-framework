! cEOS startup — minimal mgmt + AAA so Ansible can SSH in.
! OSPF and routed interfaces are pushed by the playbook (this is the point).

hostname r1
!
no aaa root
username admin privilege 15 role network-admin secret admin
!
management api http-commands
   no shutdown
!
interface Management0
   ip address 172.30.30.11/24
!
ip routing
!
end
